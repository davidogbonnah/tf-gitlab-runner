name: Terraform Deploy

on:
  push:
    branches:
      - main
      - 'feature/**' # Include feature branches
  workflow_dispatch:

env:
  AWS_REGION: "eu-west-2"
# permission can be added at job level or workflow level
permissions:
  id-token: write   # This is required for requesting the JWT
  contents: read    # This is required for actions/checkout

jobs:
  security_scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false
      - name: Run Git Secrets Scan
        uses: secret-scanner/action@0.2.1

  trivy_scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false
      - name: Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y curl
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy IaC Scan
        run: |
          trivy config --cache-dir ~/.cache/trivy --exit-code 1 --severity HIGH,CRITICAL .

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: 
      - security_scan
      - trivy_scan
    outputs:
      changes: ${{ steps.plan_changes.outputs.changes }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          role-session-name: github-actions-tf-plan-session
          role-duration-seconds: 1800
          aws-region: ${{ env.AWS_REGION }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false
      - name: Terraform Init
        run: |
          terraform init -reconfigure
      - name: Terraform Validate
        run: |
          terraform validate
      - name: Terraform Format
        run: |
          terraform fmt -check
      - name: Terraform Plan
        id: plan_changes
        run: |
          terraform plan -var 'registration_token=${{ secrets.RUNNER_TOKEN }}' -out=tfplan
          # count only resource_changes with actions other than "no-op"
          changes=$(terraform show -json tfplan | jq '[.resource_changes[] | select((.change.actions | index("no-op")) | not)] | length')
          terraform show -json tfplan | jq '[.resource_changes[] | select((.change.actions | index("no-op")) | not)] | length'
          echo "changes=$changes" >> $GITHUB_OUTPUT
      - name: Upload tfplan artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: tfplan
          path: tfplan

  apply:
    # This job will only run if the plan job is successful
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan
    if: github.ref == 'refs/heads/main' && needs.plan.outputs.changes != '0' # Only deploy on main AND when plan has changes
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: false
          lfs: false
          persist-credentials: false
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          role-session-name: github-actions-tf-apply-session
          role-duration-seconds: 1800
          aws-region: ${{ env.AWS_REGION }}
      - name: Download tfplan artifact
        uses: actions/download-artifact@v4.3.0
        with:
          name: tfplan
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3.1.2
        with:
          terraform_version: 1.11.3
          terraform_wrapper: false
      - name: Terraform Init
        run: |
          terraform init -reconfigure
      - name: Terraform Apply
        run: |
          terraform apply -auto-approve tfplan